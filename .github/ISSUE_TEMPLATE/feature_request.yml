name: Feature request
description: Suggest an improvement to the bot or website
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      description: Describe the feature and the problem it solves for your server.
      placeholder: A way to...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Optional - any workarounds you use today.
